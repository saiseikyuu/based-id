<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Based Hunters v6</title>
<style>
  body { background:#050505; padding:40px; font-family:system-ui; }
  h1 { color:#60a5fa; font-size:20px; margin-bottom:6px; }
  p  { color:#444; font-size:13px; margin-bottom:40px; }
  .grid { display:grid; grid-template-columns:repeat(2,560px); gap:32px; }
  .card { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .lbl  { font-size:10px; color:#444; letter-spacing:3px; text-transform:uppercase; }
  svg   { width:560px; border-radius:14px;
          box-shadow:0 0 0 1px rgba(255,255,255,0.07),0 24px 64px rgba(0,0,0,0.9); }
</style>
</head>
<body>
<h1>BASED HUNTERS — OFFICIAL LICENSE</h1>
<p>Blank portrait · No Korean · Hunter License card</p>
<div class="grid" id="g"></div>
<script>
var ranks = [
  { l:"E", name:"E-CLASS",  full:"E-Rank Hunter",   c:"#94a3b8", d1:"#1a1c26", d2:"#0d0f18" },
  { l:"D", name:"D-CLASS",  full:"D-Rank Hunter",   c:"#a3e635", d1:"#141d09", d2:"#0a1206" },
  { l:"C", name:"C-CLASS",  full:"C-Rank Hunter",   c:"#34d399", d1:"#071a13", d2:"#04100c" },
  { l:"B", name:"B-CLASS",  full:"B-Rank Hunter",   c:"#60a5fa", d1:"#071528", d2:"#040e1b" },
  { l:"A", name:"A-CLASS",  full:"A-Rank Hunter",   c:"#c084fc", d1:"#160826", d2:"#0e0519" },
  { l:"S", name:"S-CLASS",  full:"S-Rank Hunter",   c:"#f97316", d1:"#1e0d04", d2:"#120802" },
  { l:"N", name:"NATIONAL", full:"National Hunter", c:"#fcd34d", d1:"#1a1404", d2:"#110e02" },
];

function pad(n){ return ("000"+n).slice(-4); }

function scanLines(){
  var s="";
  for(var i=0;i<28;i++){
    var y=57+i*5;
    s+='<line x1="0" y1="'+y+'" x2="127" y2="'+y+'" stroke="#fff" stroke-width="0.7" stroke-opacity="0.04"/>';
  }
  return s;
}

function barcode(c){
  var p=[3,1,2,1,3,2,1,2,1,3,1,2,3,1,1,2,3,1,2,1,2,3,1,2,1,3,2,1];
  var x=145,s="";
  for(var i=0;i<p.length;i++){
    if(i%2===0) s+='<rect x="'+x+'" y="248" width="'+p[i]+'" height="44" fill="'+c+'" opacity="0.65"/>';
    x+=p[i]+0.6;
  }
  return s;
}

function diagLines(c){
  var s="";
  for(var i=-4;i<20;i++){
    s+='<line x1="'+(i*42)+'" y1="0" x2="'+(i*42+330)+'" y2="330" stroke="'+c+'" stroke-width="0.4" stroke-opacity="0.05"/>';
  }
  return s;
}

function card(r, id){
  var pid=pad(id), lic="HA-2026-"+pid;
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 330">'
    +'<defs>'
    +'<linearGradient id="bg'+id+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="'+r.d1+'"/><stop offset="100%" stop-color="'+r.d2+'"/></linearGradient>'
    +'<linearGradient id="hd'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#090c15"/><stop offset="100%" stop-color="#05070d"/></linearGradient>'
    +'<linearGradient id="pt'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#14182a"/><stop offset="100%" stop-color="#0a0d1a"/></linearGradient>'
    +'<radialGradient id="pg'+id+'" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="'+r.c+'" stop-opacity="0.1"/><stop offset="100%" stop-color="'+r.c+'" stop-opacity="0"/></radialGradient>'
    +'<radialGradient id="rb'+id+'" cx="50%" cy="30%" r="75%"><stop offset="0%" stop-color="'+r.c+'" stop-opacity="0.32"/><stop offset="100%" stop-color="'+r.c+'" stop-opacity="0.05"/></radialGradient>'
    +'<linearGradient id="bt'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#04060d"/><stop offset="100%" stop-color="#020409"/></linearGradient>'
    +'<filter id="gf'+id+'"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    +'<clipPath id="cl'+id+'"><rect width="520" height="330" rx="13"/></clipPath>'
    +'</defs>'

    // card base
    +'<rect width="520" height="330" fill="url(#bg'+id+')" rx="13"/>'
    +'<g clip-path="url(#cl'+id+')">'+diagLines(r.c)+'</g>'

    // header
    +'<rect x="0" y="0" width="520" height="52" fill="url(#hd'+id+')"/>'
    +'<rect x="0" y="0" width="520" height="2.5" fill="'+r.c+'" fill-opacity="0.9"/>'
    +'<rect x="0" y="51" width="520" height="1" fill="'+r.c+'" fill-opacity="0.15"/>'
    +'<text x="28" y="21" font-family="system-ui" font-size="13" font-weight="700" fill="#fff" opacity="0.95">Official Hunter\'s License</text>'
    +'<text x="28" y="39" font-family="system-ui" font-size="9.5" fill="'+r.c+'" opacity="0.75" letter-spacing="1.5">HUNTER LICENSE  &#9658;&#9658;&#9658;</text>'

    // name strip — full width parallelogram (no portrait)
    +'<polygon points="18,68 432,68 420,106 18,106" fill="'+r.c+'" fill-opacity="0.9"/>'
    +'<polygon points="18,68 432,68 420,106 18,106" fill="#000" fill-opacity="0.15"/>'
    +'<text x="28" y="93" font-family="system-ui" font-size="22" font-weight="900" fill="#fff">BASED HUNTERS</text>'
    // subtitle
    +'<text x="28" y="125" font-family="system-ui" font-size="9.5" letter-spacing="5" fill="'+r.c+'" opacity="0.65">BASED  ID</text>'
    // decorative horizontal lines below subtitle
    +'<line x1="18" y1="138" x2="390" y2="138" stroke="'+r.c+'" stroke-width="0.4" stroke-opacity="0.2"/>'
    +'<line x1="18" y1="143" x2="200" y2="143" stroke="'+r.c+'" stroke-width="0.4" stroke-opacity="0.12"/>'
    // corner bracket top-left
    +'<path d="M20 66 L20 55 L32 55" fill="none" stroke="'+r.c+'" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.6"/>'
    // license number watermark in empty space
    +'<text x="28" y="190" font-family="monospace" font-size="9" letter-spacing="2" fill="'+r.c+'" opacity="0.12">'+lic+'</text>'

    // rank badge (top right)
    +'<rect x="400" y="52" width="120" height="158" fill="url(#rb'+id+')"/>'
    +'<rect x="400" y="52" width="1.5" height="158" fill="'+r.c+'" fill-opacity="0.45"/>'
    +'<text x="413" y="142" font-family="system-ui" font-size="22" font-weight="900" fill="'+r.c+'" opacity="0.5">&#9668;&#9668;</text>'
    +'<text x="460" y="138" text-anchor="middle" dominant-baseline="middle" font-family="system-ui" font-size="68" font-weight="900" fill="'+r.c+'" filter="url(#gf'+id+')">'+r.l+'</text>'
    +'<rect x="418" y="163" width="84" height="22" rx="3" fill="'+r.c+'" fill-opacity="0.2" stroke="'+r.c+'" stroke-width="0.8" stroke-opacity="0.6"/>'
    +'<text x="460" y="178" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="800" letter-spacing="3" fill="#fff">RANK</text>'
    +'<text x="460" y="200" text-anchor="middle" font-family="system-ui" font-size="10" letter-spacing="0.5" fill="'+r.c+'" opacity="0.85" font-weight="700">'+r.name+'</text>'

    // bottom section
    +'<rect x="0" y="210" width="520" height="120" fill="url(#bt'+id+')"/>'
    +'<rect x="0" y="210" width="520" height="1" fill="'+r.c+'" fill-opacity="0.18"/>'
    // watermark
    +'<text x="300" y="285" text-anchor="middle" font-family="system-ui" font-size="68" font-weight="900" fill="'+r.c+'" opacity="0.04" transform="rotate(-8,300,285)">HUNTERS</text>'
    // info rows
    +'<text x="76" y="228" font-family="system-ui" font-size="8" fill="#475569">Class</text>'
    +'<text x="115" y="228" font-family="system-ui" font-size="8.5" fill="'+r.c+'" font-weight="700">'+r.full+'</text>'
    +'<text x="76" y="245" font-family="system-ui" font-size="8" fill="#475569">License</text>'
    +'<text x="115" y="245" font-family="monospace" font-size="8.5" fill="#cbd5e1">'+lic+'</text>'
    +'<line x1="70" y1="252" x2="390" y2="252" stroke="#fff" stroke-width="0.3" stroke-opacity="0.1"/>'
    +'<text x="76" y="265" font-family="system-ui" font-size="8" fill="#475569">Affiliation</text>'
    +'<text x="120" y="265" font-family="system-ui" font-size="8.5" fill="#94a3b8">N/A</text>'
    +'<text x="76" y="280" font-family="system-ui" font-size="8" fill="#475569">Issued by</text>'
    +'<text x="120" y="280" font-family="system-ui" font-size="8.5" fill="#94a3b8">Based ID Hunters Association</text>'

    // EMV chip
    +'<rect x="18" y="218" width="42" height="32" rx="4" fill="#c9a227" fill-opacity="0.85"/>'
    +'<rect x="18" y="218" width="42" height="32" rx="4" fill="none" stroke="#a07a10" stroke-width="0.5"/>'
    +'<line x1="18" y1="228" x2="60" y2="228" stroke="#a07a10" stroke-width="0.5"/>'
    +'<line x1="18" y1="238" x2="60" y2="238" stroke="#a07a10" stroke-width="0.5"/>'
    +'<line x1="32" y1="218" x2="32" y2="250" stroke="#a07a10" stroke-width="0.5"/>'
    +'<line x1="46" y1="218" x2="46" y2="250" stroke="#a07a10" stroke-width="0.5"/>'
    +'<rect x="20" y="220" width="10" height="10" rx="1" fill="#b8860b" fill-opacity="0.6"/>'
    +'<rect x="34" y="220" width="10" height="10" rx="1" fill="#b8860b" fill-opacity="0.6"/>'
    +'<rect x="48" y="220" width="10" height="10" rx="1" fill="#b8860b" fill-opacity="0.6"/>'
    +'<rect x="20" y="240" width="10" height="8" rx="1" fill="#b8860b" fill-opacity="0.5"/>'
    +'<rect x="34" y="240" width="10" height="8" rx="1" fill="#b8860b" fill-opacity="0.5"/>'
    +'<rect x="48" y="240" width="10" height="8" rx="1" fill="#b8860b" fill-opacity="0.5"/>'

    // barcode
    +barcode(r.c)
    +'<text x="303" y="300" text-anchor="middle" font-family="monospace" font-size="7.5" letter-spacing="2" fill="'+r.c+'" opacity="0.4">'+lic+'</text>'

    // footer
    +'<rect x="0" y="316" width="520" height="14" fill="#000" fill-opacity="0.45"/>'
    +'<rect x="0" y="327.5" width="520" height="2.5" fill="'+r.c+'" fill-opacity="0.4"/>'
    +'<text x="260" y="324" text-anchor="middle" font-family="system-ui" font-size="6.5" letter-spacing="2" fill="'+r.c+'" opacity="0.25">BASEDID.SPACE  ·  OFFICIAL HUNTER LICENSE  ·  '+lic+'</text>'

    // outer border
    +'<rect x="0.5" y="0.5" width="519" height="329" rx="12.5" fill="none" stroke="'+r.c+'" stroke-width="0.8" stroke-opacity="0.4"/>'
    +'</svg>';
}

var g=document.getElementById('g');
for(var i=0;i<ranks.length;i++){
  var d=document.createElement('div');
  d.className='card';
  d.innerHTML=card(ranks[i],i+1)+'<div class="lbl">'+ranks[i].l+' · '+ranks[i].full+'</div>';
  g.appendChild(d);
}
</script>
</body>
</html>
