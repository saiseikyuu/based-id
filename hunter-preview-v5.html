<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Based Hunters — v5</title>
<style>
  body { background: #050505; font-family: system-ui; color: #fff; padding: 40px; }
  h1 { color: #60a5fa; margin-bottom: 6px; font-size: 20px; letter-spacing: 2px; }
  p { color: #444; margin-bottom: 40px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(2, 560px); gap: 36px; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-size: 10px; color: #444; letter-spacing: 3px; text-transform: uppercase; }
  svg { width: 560px; border-radius: 14px;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 32px 80px rgba(0,0,0,0.95); }
</style>
</head>
<body>
<h1>BASED HUNTERS — OFFICIAL LICENSE v5</h1>
<p>No Korean · No Base Mainnet · Logo in portrait</p>
<div class="grid" id="grid"></div>

<script>
const ranks = [
  { letter:"E", rankName:"E-CLASS",  rankFull:"E-Rank Hunter",   color:"#94a3b8", dark:"#1a1c24", mid:"#0d0f16" },
  { letter:"D", rankName:"D-CLASS",  rankFull:"D-Rank Hunter",   color:"#a3e635", dark:"#141d08", mid:"#0a1205" },
  { letter:"C", rankName:"C-CLASS",  rankFull:"C-Rank Hunter",   color:"#34d399", dark:"#071a12", mid:"#04100b" },
  { letter:"B", rankName:"B-CLASS",  rankFull:"B-Rank Hunter",   color:"#60a5fa", dark:"#071528", mid:"#040e1a" },
  { letter:"A", rankName:"A-CLASS",  rankFull:"A-Rank Hunter",   color:"#c084fc", dark:"#160825", mid:"#0e0518" },
  { letter:"S", rankName:"S-CLASS",  rankFull:"S-Rank Hunter",   color:"#f97316", dark:"#1e0d03", mid:"#120801" },
  { letter:"N", rankName:"NATIONAL", rankFull:"National Hunter", color:"#fcd34d", dark:"#1a1403", mid:"#110e02" },
];

// Blank portrait — scan lines precomputed, no nested template literals
function scanLines() {
  let s = '';
  for (let i = 0; i < 30; i++) { const y = 57 + i * 5; s += '<line x1="0" y1="' + y + '" x2="127" y2="' + y + '" stroke="#fff" stroke-width="0.8" opacity="0.04"/>'; }
  return s;
}
function logoSVG(color) {
  return scanLines() +
    '<circle cx="63" cy="131" r="38" fill="' + color + '" fill-opacity="0.05"/>' +
    '<text x="63" y="131" text-anchor="middle" dominant-baseline="middle" font-family="system-ui,sans-serif" font-size="9" letter-spacing="4" fill="' + color + '" opacity="0.2">PHOTO</text>' +
    '<line x1="63" y1="65" x2="63" y2="78" stroke="' + color + '" stroke-width="0.5" stroke-opacity="0.3"/>' +
    '<line x1="63" y1="184" x2="63" y2="197" stroke="' + color + '" stroke-width="0.5" stroke-opacity="0.3"/>';
}
}

function hexLines(color) {
  let out = '';
  for (let i = -5; i < 25; i++) {
    out += `<line x1="${i*40}" y1="0" x2="${i*40+330}" y2="330" stroke="${color}" stroke-width="0.3" stroke-opacity="0.05"/>`;
  }
  return out;
}

function barcode(color) {
  const pat = [3,1,2,1,3,2,1,2,1,3,1,2,3,1,1,2,3,1,2,1,2,3,1,2,1,3,2,1,2,1,3,1,2];
  let x = 145; let out = '';
  pat.forEach((w, i) => {
    if (i % 2 === 0)
      out += `<rect x="${x}" y="248" width="${w}" height="44" fill="${color}" opacity="0.6"/>`;
    x += w + 0.5;
  });
  return out;
}

function chip() {
  return `<rect x="18" y="218" width="42" height="32" rx="4" fill="#c9a227" fill-opacity="0.85"/>
    <rect x="18" y="218" width="42" height="32" rx="4" fill="none" stroke="#a07a10" stroke-width="0.5"/>
    <line x1="18" y1="228" x2="60" y2="228" stroke="#a07a10" stroke-width="0.5"/>
    <line x1="18" y1="238" x2="60" y2="238" stroke="#a07a10" stroke-width="0.5"/>
    <line x1="32" y1="218" x2="32" y2="250" stroke="#a07a10" stroke-width="0.5"/>
    <line x1="46" y1="218" x2="46" y2="250" stroke="#a07a10" stroke-width="0.5"/>
    <rect x="20" y="220" width="10" height="10" rx="1" fill="#b8860b" fill-opacity="0.6"/>
    <rect x="34" y="220" width="10" height="10" rx="1" fill="#b8860b" fill-opacity="0.6"/>
    <rect x="48" y="220" width="10" height="10" rx="1" fill="#b8860b" fill-opacity="0.6"/>
    <rect x="20" y="240" width="10" height="8" rx="1" fill="#b8860b" fill-opacity="0.6"/>
    <rect x="34" y="240" width="10" height="8" rx="1" fill="#b8860b" fill-opacity="0.6"/>
    <rect x="48" y="240" width="10" height="8" rx="1" fill="#b8860b" fill-opacity="0.6"/>`;
}

function makeSVG({ letter, rankName, rankFull, color, dark, mid }, id) {
  const pid = String(id).padStart(4, '0');
  const licNo = `HA-2026-${pid}`;

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 330">
<defs>
  <linearGradient id="cbg${id}" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="${dark}"/>
    <stop offset="100%" stop-color="${mid}"/>
  </linearGradient>
  <linearGradient id="hdr${id}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#090c15"/>
    <stop offset="100%" stop-color="#05070e"/>
  </linearGradient>
  <linearGradient id="acc${id}" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="${color}" stop-opacity="0.95"/>
    <stop offset="80%" stop-color="${color}" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="ptbg${id}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#161a28"/>
    <stop offset="100%" stop-color="#0b0d18"/>
  </linearGradient>
  <radialGradient id="ptglow${id}" cx="50%" cy="55%" r="55%">
    <stop offset="0%" stop-color="${color}" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rbadge${id}" cx="50%" cy="25%" r="80%">
    <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="${color}" stop-opacity="0.06"/>
  </radialGradient>
  <linearGradient id="bot${id}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#05070e"/>
    <stop offset="100%" stop-color="#030508"/>
  </linearGradient>
  <filter id="gf${id}">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="card${id}"><rect width="520" height="330" rx="13"/></clipPath>
  <clipPath id="port${id}"><rect x="0" y="52" width="127" height="144" rx="0"/></clipPath>
</defs>

<!-- Card base -->
<rect width="520" height="330" fill="url(#cbg${id})" rx="13"/>

<!-- Background diagonal lines -->
<g clip-path="url(#card${id})">${hexLines(color)}</g>

<!-- ── HEADER BAR ── -->
<rect x="0" y="0" width="520" height="52" fill="url(#hdr${id})"/>
<rect x="0" y="0" width="520" height="2.5" fill="${color}" fill-opacity="0.95"/>
<rect x="0" y="51" width="520" height="1" fill="${color}" fill-opacity="0.15"/>

<!-- Title line -->
<text x="148" y="21" font-family="system-ui,sans-serif" font-size="13" font-weight="700"
  fill="#ffffff" opacity="0.95" letter-spacing="0.5">Official Hunter's License</text>
<!-- Subtitle with chevrons -->
<text x="148" y="39" font-family="system-ui,sans-serif" font-size="9.5"
  fill="${color}" opacity="0.75" letter-spacing="1.5">HUNTER LICENSE  ▶▶▶</text>

<!-- ── PORTRAIT AREA ── -->
<rect x="0" y="0" width="127" height="210" fill="url(#ptbg${id})"/>
<rect x="0" y="52" width="127" height="158" fill="url(#ptglow${id})"/>
<!-- Right edge line -->
<rect x="125" y="0" width="2" height="210" fill="${color}" fill-opacity="0.3"/>

<!-- Portrait interior detail -->
${logoSVG(color)}

<!-- Portrait corner brackets -->
<path d="M7 63 L7 53 L17 53" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.8"/>
<path d="M119 63 L119 53 L109 53" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.8"/>
<path d="M7 199 L7 209 L17 209" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.8"/>
<path d="M119 199 L119 209 L109 209" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.8"/>

<!-- Based ID label under logo -->
<rect x="0" y="196" width="127" height="14" fill="${color}" fill-opacity="0.2"/>
<text x="63" y="206" text-anchor="middle" font-family="system-ui,sans-serif"
  font-size="7" font-weight="700" letter-spacing="2" fill="${color}" opacity="0.9">BASED ID</text>

<!-- ── NAME STRIP ── -->
<polygon points="127,72 432,72 420,106 127,106" fill="${color}" fill-opacity="0.88"/>
<polygon points="127,72 432,72 420,106 127,106" fill="#000" fill-opacity="0.18"/>
<text x="136" y="94" font-family="system-ui,sans-serif" font-size="20" font-weight="900"
  fill="#ffffff" opacity="0.98">BASED HUNTER</text>
<text x="136" y="119" font-family="system-ui,sans-serif" font-size="9" letter-spacing="5"
  fill="${color}" opacity="0.7">BASED  HUNTERS</text>
<!-- Chevrons on right of name strip -->
<text x="405" y="95" font-family="system-ui,sans-serif" font-size="18" font-weight="900"
  fill="#ffffff" opacity="0.1">◄◄◄</text>

<!-- ── RANK BADGE TOP-RIGHT ── -->
<rect x="400" y="52" width="120" height="158" fill="url(#rbadge${id})"/>
<rect x="400" y="52" width="1.5" height="158" fill="${color}" fill-opacity="0.45"/>

<!-- Big rank letter -->
<text x="460" y="136" text-anchor="middle" dominant-baseline="middle"
  font-family="system-ui,sans-serif" font-size="68" font-weight="900"
  fill="${color}" filter="url(#gf${id})">${letter}</text>

<!-- Chevrons pointing to rank -->
<text x="413" y="140" font-family="system-ui,sans-serif" font-size="22" font-weight="900"
  fill="${color}" opacity="0.5">◄◄</text>

<!-- RANK badge box -->
<rect x="418" y="163" width="84" height="22" rx="3"
  fill="${color}" fill-opacity="0.2" stroke="${color}" stroke-width="0.8" stroke-opacity="0.6"/>
<text x="460" y="178" text-anchor="middle" font-family="system-ui,sans-serif"
  font-size="10" font-weight="800" letter-spacing="3" fill="#ffffff">RANK</text>

<!-- Rank class label -->
<text x="460" y="200" text-anchor="middle" font-family="system-ui,sans-serif"
  font-size="10" letter-spacing="0.5" fill="${color}" opacity="0.85" font-weight="700">${rankName}</text>

<!-- ── BOTTOM INFO SECTION ── -->
<rect x="0" y="210" width="520" height="120" fill="url(#bot${id})"/>
<rect x="0" y="210" width="520" height="1" fill="${color}" fill-opacity="0.18"/>

<!-- Watermark -->
<text x="300" y="285" text-anchor="middle" font-family="system-ui,sans-serif"
  font-size="70" font-weight="900" fill="${color}" opacity="0.04"
  transform="rotate(-8,300,285)">HUNTERS</text>

<!-- Info rows (English only) -->
<text x="76" y="228" font-family="system-ui,sans-serif" font-size="8" fill="#475569">Class</text>
<text x="115" y="228" font-family="system-ui,sans-serif" font-size="8.5" fill="${color}" font-weight="700">${rankFull}</text>

<text x="76" y="245" font-family="system-ui,sans-serif" font-size="8" fill="#475569">License</text>
<text x="115" y="245" font-family="monospace,system-ui" font-size="8.5" fill="#cbd5e1">${licNo}</text>

<line x1="70" y1="252" x2="390" y2="252" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.1"/>

<text x="76" y="265" font-family="system-ui,sans-serif" font-size="8" fill="#475569">Affiliation</text>
<text x="120" y="265" font-family="system-ui,sans-serif" font-size="8.5" fill="#94a3b8">N/A</text>

<text x="76" y="280" font-family="system-ui,sans-serif" font-size="8" fill="#475569">Issued by</text>
<text x="120" y="280" font-family="system-ui,sans-serif" font-size="8.5" fill="#94a3b8">Based ID Hunters Association</text>

<!-- EMV Chip -->
${chip()}

<!-- Barcode -->
${barcode(color)}
<text x="303" y="300" text-anchor="middle" font-family="monospace,system-ui"
  font-size="7.5" letter-spacing="2" fill="${color}" opacity="0.4">${licNo}</text>

<!-- Bottom footer strip -->
<rect x="0" y="316" width="520" height="14" fill="#000" fill-opacity="0.45"/>
<rect x="0" y="327.5" width="520" height="2.5" rx="2" fill="${color}" fill-opacity="0.4"/>
<text x="260" y="324" text-anchor="middle" font-family="system-ui,sans-serif"
  font-size="6.5" letter-spacing="2" fill="${color}" opacity="0.25">BASEDID.SPACE  ·  OFFICIAL HUNTER LICENSE  ·  ${licNo}</text>

<!-- Card outer border -->
<rect x="0.5" y="0.5" width="519" height="329" rx="12.5"
  fill="none" stroke="${color}" stroke-width="0.8" stroke-opacity="0.4"/>
</svg>`;
}

const grid = document.getElementById('grid');
ranks.forEach((r, i) => {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = makeSVG(r, i + 1) + `<div class="label">${r.letter} · ${r.rankFull}</div>`;
  grid.appendChild(div);
});
</script>
</body>
</html>
